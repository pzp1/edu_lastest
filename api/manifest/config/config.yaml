server:
  address:     ":8808"
  serverRoot: "resource/public"
  dumpRouterMap: false
  routeOverWrite: true
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  NameToUriType: 3
  maxHeaderBytes: "20KB"
  clientMaxBodySize: "50MB"
  # Logging配置
  accessLogEnabled: false              # 是否记录访问日志。默认为false
  logger:
    path: "resource/log/server"           # 日志文件路径。默认为空，表示关闭，仅输出到终端
    file: "{Y-m-d}.log"         # 日志文件格式。默认为"{Y-m-d}.log"
    level: "all"                 # 日志输出级别
    stdout: true                  # 日志是否同时输出到终端。默认true
    RotateExpire: "1d"
    RotateBackupLimit: 3
    RotateBackupExpire: "7d"
    RotateBackupCompress: 9

logger:
  path: "resource/log/run"
  file: "{Y-m-d}.log"
  level: "all"
  stdout: true
  RotateExpire: "1d"
  RotateBackupLimit: 3
  RotateBackupExpire: "7d"
  RotateBackupCompress: 9

# Database.
database:
  logger:
    level: "all"
    stdout: true
    Path: "resource/log/sql"
    RotateExpire: "1d"
    RotateBackupLimit: 3
    RotateBackupExpire: "7d"
    RotateBackupCompress: 9

  default:
    link:   "mysql:root:123456@tcp(localhost:3306)/edu?charset=utf8mb4&parseTime=true&loc=Local"
    debug:  true
    charset: "utf8mb4" #数据库编码
    dryRun: false #空跑
    maxIdle: 10 #连接池最大闲置的连接数
    maxOpen: 10 #连接池最大打开的连接数
    maxLifetime: "30s" #(单位秒)连接对象可重复使用的时间长度

gfToken:
  cacheKey: "gfToken:"
  timeOut: 10800
  maxRefresh: 5400
  multiLogin: true
  encryptKey: "49c54195e750b04e74a8429b17896586"
  cacheModel: "memory"
  excludePaths:
    - "/api/v1/system/login"

# Redis 配置示例
redis:
  # 单实例配置
  default:
    address: 127.0.0.1:6379
    db: 1
    idleTimeout: "60s" #连接最大空闲时间，使用时间字符串例如30s/1m/1d
    maxConnLifetime: "90s" #连接最长存活时间，使用时间字符串例如30s/1m/1d
    waitTimeout: "60s" #等待连接池连接的超时时间，使用时间字符串例如30s/1m/1d
    dialTimeout: "30s" #TCP连接的超时时间，使用时间字符串例如30s/1m/1d
    readTimeout: "30s" #TCP的Read操作超时时间，使用时间字符串例如30s/1m/1d
    writeTimeout: "30s" #TCP的Write操作超时时间，使用时间字符串例如30s/1m/1d
    maxActive: 100

system:
  notCheckAuthAdminIds: [1,2,31]  #无需验证后台权限的用户id
  dataDir: "./resource/data"
  cache:
    model: "memory"  #缓存模式 memory OR redis
    prefix: "gFastV3Cache:" #缓存前缀

#casbin配置
casbin:
  modelFile: "./resource/casbin/rbac_model.conf"
  policyFile: "./resource/casbin/rbac_policy.csv"
  cluster: false
